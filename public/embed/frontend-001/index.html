<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend 001 — Placeholder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: #D1D1CB;
      color: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .wrap { padding: 2rem; max-width: 600px; }
    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 700;
      color: #FF3D00;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
    }
    p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      color: #8A8A85;
      line-height: 1.7;
      margin-bottom: 1rem;
    }
    code {
      background: #1A1A1A;
      color: #FF3D00;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.8em;
    }
    .footer {
      margin-top: 2rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #8A8A85;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>FRONTEND 001</h1>
    <p>把你的前端项目文件（HTML / CSS / JS / assets）放进当前这个文件夹：</p>
    <p><code>public/embed/frontend-001/</code></p>
    <p>覆盖这个 <code>index.html</code> 即可，刷新主站就能在 lightbox 里看到你的 demo。</p>
    <div class="footer">PLACEHOLDER · REPLACE ME</div>
  </div>
</body>
</html>
